<div class="flex flex-col p-6 bg-white rounded-2xl w-full">
  <!-- Header -->
  <div class="block sm:flex justify-between items-center mb-6">
    <h3 class="text-lg xl:text-xl font-semibold text-[#6B6B6B] mb-2 sm:mb-0">
      Current price
    </h3>

    <div class="flex rounded-[10px] border border-ui-grey-light w-fit">
      <button
        (click)="activePeriod.set('days')"
        [ngClass]="activePeriod() === 'days' ? 'bg-brand-orange text-white' : ''"
        class="px-4 py-1.5 text-sm font-medium rounded-l-[10px] transition-all"
      >
        Days
      </button>
      <button
        (click)="activePeriod.set('months')"
        [ngClass]="activePeriod() === 'months' ? 'bg-brand-orange text-white' : ''"
        class="px-4 py-1.5 text-sm font-medium rounded-r-[10px] transition-all"
      >
        Month
      </button>
    </div>
  </div>

  <!-- Chart Container -->
  <div #chartContainer class="w-full h-75"></div>

  <!-- Footer Legend -->
  <div class="flex items-center justify-center gap-2 mt-4">
    <span class="w-2.5 h-2.5 bg-green-400 rounded-full"></span>
    <span class="text-sm font-medium">Amount of tips transferred</span>
  </div>
</div>
