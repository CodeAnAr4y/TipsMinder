<section class="narrow-wrapper py-8">
  <h1 class="mb-6">Cards</h1>

  <div class="module overflow-hidden p-0 overflow-x-scroll md:overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-ui-grey-light bg-ui-white-f9">
          <th class="p-2 md:p-4 font-medium text-ui-grey-41">Number</th>
          <th class="p-2 md:p-4 font-medium text-ui-grey-41">Card number</th>
          <th class="p-2 md:p-4 font-medium text-ui-grey-41">Status</th>
          <th class="p-2 md:p-4 font-medium text-ui-grey-41">Valid till</th>
          <th class="p-2 md:p-4 font-medium text-ui-grey-41">Action</th>
        </tr>
      </thead>
      <tbody>
        @for (card of cards(); track card.id) {
        <tr class="cursor-pointer border-b border-ui-grey-light last:border-0 odd:bg-white hover:font-semibold" [routerLink]="['/details', card.id]">
          <td class="p-2 md:p-4 text-ui-grey-56">{{ card.id }}</td>
          <td class="p-2 md:p-4 font-mono text-ui-grey-56">{{ card.cardNumber }}</td>
          <td class="p-2 md:p-4">
            <span class="status-badge" [ngClass]="'status-' + card.status">
              {{ card.status }}
            </span>
          </td>
          <td class="p-2 md:p-4 text-ui-grey-56">{{ card.cardExpire }}</td>
          <td class="p-2 md:p-4">
            <div class="inline-flex gap-2">
              <button class="btn-action" (click)="$event.stopPropagation(); logoutCard(card.id)" title="Logout">
                <img src="icons/logout.svg" alt="Logout" />
              </button>
              <button class="btn-action" (click)="$event.stopPropagation(); blockCard(card.id)" title="Block">
                <img src="icons/lock.svg" alt="Block" />
              </button>
            </div>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</section>
