<section>
  <h1 class="mb-6">Merchant agreement</h1>

  <div class="module rounded-b-none">
    <form [formGroup]="contractForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Company name</label>
        <div class="relative">
          <select
            formControlName="companyName"
            class="input-field appearance-none border-ui-input-stroke border-2 rounded-[10px] pr-10"
            [ngClass]="{ 'input-error': formErrors()['companyName'] }"
          >
            <option value="" disabled selected hidden>Select company</option>
            <option value="feastly">Feastly Delights</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none border-t-4 border-t-ui-black border-x-4 border-x-transparent"></div>
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Terminal monthly fee</label>
        <div class="relative">
          <select
            formControlName="terminalMonthlyFee"
            class="input-field appearance-none border-ui-input-stroke border-2 rounded-[10px] pr-10"
            [ngClass]="{ 'input-error': formErrors()['terminalMonthlyFee'] }"
          >
            <option value="" disabled selected hidden>Select fee</option>
            <option value="2719271819">2719271819</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none border-t-4 border-t-ui-black border-x-4 border-x-transparent"></div>
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Personal code</label>
        <input
          formControlName="personalCode"
          type="text"
          class="input-field border-ui-input-stroke border-2 rounded-[10px]"
          placeholder="125091871"
          [ngClass]="{ 'input-error': formErrors()['personalCode'] }"
        />
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Telephone number</label>
        <input
          formControlName="telephoneNumber"
          type="text"
          class="input-field border-ui-input-stroke border-2 rounded-[10px]"
          placeholder="909-569-6098"
          [ngClass]="{ 'input-error': formErrors()['telephoneNumber'] }"
        />
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Address</label>
        <input
          formControlName="address"
          type="text"
          class="input-field border-ui-input-stroke border-2 rounded-[10px]"
          placeholder="229 Gordon Street..."
          [ngClass]="{ 'input-error': formErrors()['address'] }"
        />
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Bank account number</label>
        <input
          formControlName="bankAccountNumber"
          type="text"
          class="input-field border-ui-input-stroke border-2 rounded-[10px]"
          placeholder="BTO918282811291"
          [ngClass]="{ 'input-error': formErrors()['bankAccountNumber'] }"
        />
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Email</label>
        <input
          formControlName="email"
          type="email"
          class="input-field border-ui-input-stroke border-2 rounded-[10px]"
          placeholder="jackson2_delight@gmal.com"
          [ngClass]="{ 'input-error': formErrors()['email'] }"
        />
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Date from</label>
        <input
          formControlName="dateFrom"
          type="date"
          class="input-field border-ui-input-stroke border-2 rounded-[10px]"
          [ngClass]="{ 'input-error': formErrors()['dateFrom'] }"
        />
      </div>

      <div class="flex flex-col gap-3">
        <label class="text-[14px]">Contract number</label>
        <div class="relative">
          <select
            formControlName="contractNumber"
            class="input-field appearance-none border-ui-input-stroke border-2 rounded-[10px] pr-10"
            [ngClass]="{ 'input-error': formErrors()['contractNumber'] }"
          >
            <option value="" disabled selected hidden>Select contract number</option>
            <option value="02929128119192189">02929128119192189</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none border-t-4 border-t-ui-black border-x-4 border-x-transparent"></div>
        </div>
      </div>
    </form>
  </div>

  <div class="module rounded-t-none border-t-0 mb-8 flex gap-4 font-semibold text-[14px]">
    <button
      (click)="onSubmit()"
      class="bg-brand-orange text-white px-4 py-3 rounded-[5px] disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="contractForm.invalid"
    >
      Sign contract
    </button>
    <button
      routerLink=".."
      class="px-4 py-3 border border-ui-black rounded-[5px] font-medium hover:bg-ui-black/5 transition-colors"
    >
      Back
    </button>
  </div>
</section>
