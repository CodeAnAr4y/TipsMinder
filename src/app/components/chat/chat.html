<div class="max-w-md p-6 bg-white rounded-xl shadow-lg border border-ui-item-stroke">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold">Echo Chat</h2>
    <span
      [class]="
        'px-2 py-1 text-xs rounded ' +
        (isConnected()
          ? 'bg-status-active-bg text-status-active'
          : 'bg-status-error-bg text-status-error')
      "
    >
      {{ isConnected() ? 'Online' : 'Reconnecting...' }}
    </span>
  </div>

  <div class="h-80 overflow-y-auto mb-4 p-4 bg-gray-50 rounded-lg flex flex-col gap-2">
    @for (msg of messages(); track $index) {
    <div
      [ngClass]="
        msg.type === 'sent'
          ? 'self-end bg-ui-black text-white'
          : 'self-start bg-gray-200 text-gray-800'
      "
      class="max-w-[80%] px-4 py-2 rounded-2xl text-sm shadow-sm wrap-break-word"
    >
      {{ msg.text }}
    </div>
    }
  </div>

  <div class="flex gap-2">
    <input
      [(ngModel)]="newMessage"
      (keyup.enter)="sendMessage()"
      placeholder="Type something..."
      class="flex-1 px-4 py-2 border rounded-full focus:outline-none border-ui-input-stroke"
    />
    <button
      (click)="sendMessage()"
      class="px-4 py-2 bg-brand-orange text-white rounded-full hover:bg-brand-orange-deep transition-colors disabled:bg-brand-orange-light"
      [disabled]="!isConnected()"
    >
      Send
    </button>
  </div>
</div>
